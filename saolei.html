<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>扫雷</title>
    <style>
        :root {
            --cell-size: 45px;
            --color-on: rgb(255, 204, 51);
            --color-off: rgb(242, 242, 242);
        }

        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
            margin: 0;
            padding: 10px;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 控制面板 */
        .controls {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 90%;
            max-width: 400px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        input[type=range] { flex: 1; }

        /* 核心缩放容器 */
        #viewport {
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-origin: top center;
            transition: transform 0.2s ease-out;
        }

        .grid-frame {
            background: white;
            padding: 1px;
            border: 1px solid #999;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .grid {
            display: grid;
            background-color: #d3d3d3;
            gap: 1px;
        }

        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            background-color: var(--color-off);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            box-sizing: border-box;
        }

        .cell.is-on { background-color: var(--color-on); }
        .count-red { color: red; }
        .count-gray { color: #555; }

        .info-panel {
            margin-top: 10px;
            width: 100%;
            height: 45px;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: blue;
            font-weight: bold;
            font-size: 16px;
            border: 1px solid #ccc;
        }

        /* 尺寸较大时隐藏文字，防止重叠且增加性能 */
        .small-text { font-size: 10px; }
        .no-text { font-size: 0; }
    </style>
</head>
<body>

    <div class="controls">
        <div class="slider-container">
            <span>尺寸: <b id="sizeDisplay">9</b></span>
            <input type="range" id="sizeSlider" min="1" max="40" value="9">
        </div>
    </div>

    <div id="viewport">
        <div class="grid-frame">
            <div id="grid" class="grid"></div>
        </div>
        <div class="info-panel" id="counter">总点亮格子数：0</div>
    </div>

    <script>
        const gridElement = document.getElementById('grid');
        const sizeSlider = document.getElementById('sizeSlider');
        const sizeDisplay = document.getElementById('sizeDisplay');
        const counterElement = document.getElementById('counter');
        const viewport = document.getElementById('viewport');

        let size = 9;
        let gridState = [];

        // 初始化/重置数据
        function initGrid() {
            gridState = Array(size).fill().map(() => Array(size).fill(false));
            render();
        }

        // 计算逻辑
        function getSurroundingCount(r, c) {
            let count = 0;
            for (let i = r - 1; i <= r + 1; i++) {
                for (let j = c - 1; j <= c + 1; j++) {
                    if (i >= 0 && i < size && j >= 0 && j < size) {
                        if (gridState[i][j]) count++;
                    }
                }
            }
            return count;
        }

        // 渲染函数
        function render() {
            sizeDisplay.innerText = size;
            gridElement.style.gridTemplateColumns = `repeat(${size}, var(--cell-size))`;
            
            // 使用 DocumentFragment 提升大数据量渲染性能
            const fragment = document.createDocumentFragment();
            let totalOn = 0;

            for (let i = 0; i < size; i++) {
                for (let j = 0; j < size; j++) {
                    const isOn = gridState[i][j];
                    if (isOn) totalOn++;

                    const cell = document.createElement('div');
                    cell.className = 'cell' + (isOn ? ' is-on' : '');
                    
                    if (!isOn) {
                        const cnt = getSurroundingCount(i, j);
                        if (cnt > 0) {
                            const span = document.createElement('span');
                            span.innerText = cnt;
                            span.className = cnt > 2 ? 'count-red' : 'count-gray';
                            // 尺寸太大时自动缩小文字
                            if (size > 25) span.className += ' no-text';
                            else if (size > 15) span.className += ' small-text';
                            cell.appendChild(span);
                        }
                    }

                    cell.onclick = () => {
                        gridState[i][j] = !gridState[i][j];
                        render();
                    };
                    fragment.appendChild(cell);
                }
            }

            gridElement.innerHTML = '';
            gridElement.appendChild(fragment);
            counterElement.innerText = `总点亮格子数：${totalOn}`;
            
            // 每次渲染后根据尺寸调整整体缩放
            adjustScale();
        }

        // 核心缩放适配
        function adjustScale() {
            const screenWidth = window.innerWidth - 40; // 留出一点边距
            const gridPhysicalWidth = size * 46; // 45px + 1px gap
            
            // 计算面板宽度（底部信息栏）
            counterElement.style.width = (gridPhysicalWidth) + "px";

            if (gridPhysicalWidth > screenWidth) {
                const ratio = screenWidth / gridPhysicalWidth;
                viewport.style.transform = `scale(${ratio})`;
            } else {
                viewport.style.transform = `scale(1)`;
            }
        }

        // 事件监听
        sizeSlider.oninput = (e) => {
            size = parseInt(e.target.value);
            initGrid();
        };

        window.onresize = adjustScale;

        // 启动
        initGrid();
    </script>
</body>
</html>
